<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto síndico - gestão automática de condomínios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Sora:wght@500;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f7ef;
            --bg-soft: #eef3e2;
            --surface: #ffffff;
            --ink: #1c2b21;
            --muted: #5b6b61;
            --brand: #1f6f4a;
            --brand-dark: #124e32;
            --accent: #d89b2b;
            --line: #d9e4d3;
            --shadow: 0 14px 35px rgba(16, 54, 34, 0.09);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "DM Sans", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(1200px 400px at 90% -20%, rgba(216, 155, 43, 0.18), transparent 60%),
                radial-gradient(900px 350px at -20% 10%, rgba(31, 111, 74, 0.13), transparent 58%),
                var(--bg);
        }

        .header {
            background: linear-gradient(125deg, var(--brand-dark), var(--brand));
            color: #f7fff6;
            padding: 36px 0 42px;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: "";
            position: absolute;
            width: 360px;
            height: 360px;
            border-radius: 50%;
            right: -100px;
            top: -180px;
            background: radial-gradient(circle, rgba(255,255,255,0.2), transparent 60%);
        }

        .header-content {
            max-width: 920px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: "Sora", sans-serif;
        }

        .display-4 {
            letter-spacing: -0.02em;
        }

        .lead {
            color: rgba(247, 255, 246, 0.88);
        }

        .content-shell {
            margin-top: -14px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.84);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: var(--shadow);
            backdrop-filter: blur(6px);
            padding: 22px;
        }

        .feature-card {
            padding: 22px;
            border-radius: 16px;
            border: 1px solid var(--line);
            box-shadow: 0 10px 24px rgba(16, 54, 34, 0.06);
            background-color: var(--surface);
            height: 100%;
            transition: transform 0.22s ease, box-shadow 0.22s ease;
        }

        .feature-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 30px rgba(16, 54, 34, 0.1);
        }

        .feature-icon {
            font-size: 2rem;
            color: var(--brand);
            margin-bottom: 14px;
        }

        .nav-tabs {
            border-bottom: 1px solid var(--line);
            margin-bottom: 14px;
        }

        .nav-tabs .nav-link {
            border: 0;
            color: var(--muted);
            border-bottom: 3px solid transparent;
            border-radius: 0;
            font-weight: 700;
            padding: 0.65rem 1rem;
        }

        .nav-tabs .nav-link.active {
            color: var(--brand-dark);
            background: transparent;
            border-bottom-color: var(--accent);
        }

        .table {
            --bs-table-bg: transparent;
            margin-bottom: 0;
        }

        .table > :not(caption) > * > * {
            padding: 0.8rem 0.65rem;
            border-bottom-color: var(--line);
        }

        .table thead th {
            background: var(--bg-soft);
            color: var(--brand-dark);
            font-family: "Sora", sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .table tbody tr:hover {
            background: rgba(31, 111, 74, 0.05);
        }

        .table-responsive {
            border: 1px solid var(--line);
            border-radius: 12px;
            background: var(--surface);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
        }

        .check-icon {
            color: var(--brand);
            margin-left: 4px;
        }

        .footer {
            background: linear-gradient(145deg, #1b422f, #103523);
            color: #dbe8de;
            padding: 20px 0;
            text-align: center;
        }

        .cta-section {
            padding: 18px 0;
        }

        .metric-value {
            font-family: "Sora", sans-serif;
            font-weight: 800;
            color: var(--brand-dark);
        }

        .metric-label {
            color: var(--muted);
        }

        @media (max-width: 768px) {
            .header {
                padding: 28px 0 34px;
            }

            .content-shell {
                padding: 14px;
                border-radius: 14px;
            }

            .feature-card {
                padding: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="header text-center">
        <div class="container">
            <div class="header-content">
                <h1 class="display-4 fw-bold mb-4">Auto Síndico</h1>
                <p class="lead mb-5">Gestão automática de condomínios</p>
            </div>
        </div>
    </div>

    <section class="py-4 py-md-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12">
                    <div class="content-shell">
                        {% block content %}{% endblock %}
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="cta-section">
        <div class="container"></div>
    </section>

    <footer class="footer">
        <div class="container">
            <p class="mb-0">&copy; 2025 Auto Síndico. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
